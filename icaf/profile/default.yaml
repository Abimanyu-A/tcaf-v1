ssh:
  connect_command: "ssh -o HostKeyAlgorithms=+ssh-rsa -o PubkeyAcceptedAlgorithms=+ssh-rsa {user}@{ip}"
  ssh_v1_command: "ssh -1 {user}@{ip}"

  fingerprint_prompt:
    - "continue connecting"

  password_prompt:
    - "password"

  success_prompt:
    - "$"
    - "#"
    - ">"

  failure_prompt:
    - "Permission denied"
    - "connection refused"

  invalid_password: "wrongpassword"

  commands:
    verify_login: "whoami"


https:
  login_path: "/dvwa/login.php"

  login_page_identifiers:
    - "login"
    - "username"
    - "password"

  invalid_login_identifiers:
    - "login failed"
    - "incorrect"


tls:
  tls10_test_command: "openssl s_client -connect {ip}:443 -tls1"
  tls11_test_command: "openssl s_client -connect {ip}:443 -tls1_1"

  failure_indicators:
    - "error"
    - "protocol version"

  success_indicator:
    - "Cipher"


cipher_scan:
  deprecated_ciphers:
    - "RC4"
    - "3DES"
    - "DES"
    - "MD5"
    - "EXPORT"
    - "NULL"

  scan_command: "nmap --script ssl-enum-ciphers -p 443 {ip}"


snmp:

  # SNMPv1 test
  v1_command: "snmpwalk -v1 -c public {ip}"

  # SNMPv2 test
  v2_command: "snmpwalk -v2c -c public {ip}"

  # SNMPv3 VALID AUTHENTICATION + ENCRYPTION
  v3_valid_command: >
    snmpget -v3
    -u {user}
    -l authPriv
    -a SHA
    -A {auth_pass}
    -x AES
    -X {priv_pass}
    {ip}
    1.3.6.1.2.1.1.3.0

  # SNMPv3 WRONG AUTH PASSWORD
  v3_wrong_auth_command: >
    snmpget -v3
    -u {user}
    -l authPriv
    -a SHA
    -A {wrong_auth}
    -x AES
    -X {priv_pass}
    {ip}
    1.3.6.1.2.1.1.3.0

  # SNMPv3 WRONG ENCRYPTION PASSWORD
  v3_wrong_priv_command: >
    snmpget -v3
    -u {user}
    -l authPriv
    -a SHA
    -A {auth_pass}
    -x AES
    -X {wrong_priv}
    {ip}
    1.3.6.1.2.1.1.3.0

  get_uptime_v2: snmpget -v2c -c {community} {ip} 1.3.6.1.2.1.1.3.0


  success_indicators:
    - "Timeticks"

  failure_indicators:
    - "Timeout"
    - "authenticationFailure"
    - "No Response"